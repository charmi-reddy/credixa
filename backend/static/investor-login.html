<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Login</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="investor-login">
    <div class="page-shell">
        <div class="container narrow">
            <a class="back-link" href="/">Back to role selection</a>
            <section class="card auth-card">
                <div class="role-kicker">Investor</div>
                <h1 class="subpage-title">Investor Login</h1>
                <p class="card-copy">The investor gives a lower upfront amount to the supplier and later collects the full amount from the buyer.</p>
                <div class="helper-box">Default login: ID `investor`, Password `1234`</div>
                <div class="input-group">
                    <label for="investorUserId">Investor ID</label>
                    <input id="investorUserId" type="text" placeholder="investor">
                </div>
                <div class="input-group">
                    <label for="investorPassword">Password</label>
                    <input id="investorPassword" type="password" placeholder="1234">
                </div>
                <button id="btnInvestorLogin" class="btn secondary">Login as Investor</button>
            </section>
        </div>
    </div>
    <div id="popup" class="popup hidden"><div class="popup-card"><div id="popupTag" class="popup-tag">Login</div><h3 id="popupTitle">Title</h3><p id="popupMessage">Message</p><button id="btnClosePopup" class="btn primary">Close</button></div></div>
    <script src="/static/app.bundle.js"></script>
</body>
</html>
