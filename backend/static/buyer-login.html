<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Login</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="buyer-login">
    <div class="page-shell">
        <div class="container narrow">
            <a class="back-link" href="/">Back to role selection</a>
            <section class="card auth-card">
                <div class="role-kicker">Buyer</div>
                <h1 class="subpage-title">Buyer Login</h1>
                <p class="card-copy">The buyer is the one who should actually pay the supplier, but after funding they pay the investor the full amount.</p>
                <div class="helper-box">Default login: ID `1234`, Password `1234`</div>
                <div class="input-group">
                    <label for="buyerId">Buyer ID</label>
                    <input id="buyerId" type="text" placeholder="Enter buyer ID">
                </div>
                <div class="input-group">
                    <label for="buyerPassword">Password</label>
                    <input id="buyerPassword" type="password" placeholder="Enter password">
                </div>
                <div class="split-actions">
                    <button id="btnBuyerLogin" class="btn primary">Login as Buyer</button>
                    <button id="btnBuyerRegister" class="btn secondary">Register Buyer</button>
                </div>
            </section>
        </div>
    </div>
    <div id="popup" class="popup hidden"><div class="popup-card"><div id="popupTag" class="popup-tag">Login</div><h3 id="popupTitle">Title</h3><p id="popupMessage">Message</p><button id="btnClosePopup" class="btn primary">Close</button></div></div>
    <script src="/static/app.bundle.js"></script>
</body>
</html>
